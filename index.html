<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate" />
<meta http-equiv="Pragma" content="no-cache" />
<meta http-equiv="Expires" content="0" />
<title>이도형 | 커버링 성장 대시보드</title>
<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.3/dist/chart.umd.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/chartjs-plugin-annotation@3.0.1/dist/chartjs-plugin-annotation.min.js"></script>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: 'Pretendard', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
    background: #ffffff;
    padding: 24px;
  }
  .card {
    background: white;
    border-radius: 12px;
    border: 1px solid #E5E7EB;
    padding: 22px 22px 16px;
    box-shadow: 0 1px 4px rgba(0,0,0,0.07);
    max-width: 1100px;
    margin: 0 auto;
  }
  .card h3 { font-size: 15px; font-weight: 700; color: #111827; }
  .card .desc { font-size: 12px; color: #6B7280; margin-top: 3px; margin-bottom: 16px; line-height: 1.5; }
  .chart-wrap { position: relative; height: 360px; }
  .legend-row { display: flex; flex-wrap: wrap; gap: 14px; margin-top: 14px; }
  .legend-item { display: flex; align-items: center; gap: 5px; font-size: 12px; color: #6B7280; }
  .legend-dot { width: 10px; height: 10px; border-radius: 2px; flex-shrink: 0; }
  .join-label { font-size: 11px; color: #60A5FA; text-align: center; margin-top: 8px; }
  .confidential-note { font-size: 11px; color: #9CA3AF; margin-top: 12px; padding-top: 10px; border-top: 1px dashed #E5E7EB; }
  .confidential-note b { color: #6B7280; }
</style>
</head>
<body>
<div class="card">
  <h3>6대 성장 지표 통합 (입사 시점 대비 성장율)</h3>
  <div class="desc">입사(2025-01) 시점 대비 성장율(%)로 표시 — 매출·CAC·공헌이익율 등 재무 지표는 대외비로 비공개, 운영 성장 추이만 노출</div>
  <div class="chart-wrap"><canvas id="chartAll"></canvas></div>
  <div class="legend-row">
    <div class="legend-item"><span class="legend-dot" style="background:#DC2626"></span>누적 총 유저</div>
    <div class="legend-item"><span class="legend-dot" style="background:#1A56DB"></span>30DAU</div>
    <div class="legend-item"><span class="legend-dot" style="background:#10B981"></span>주문 수</div>
    <div class="legend-item"><span class="legend-dot" style="background:#8B5CF6"></span>신규 가입자</div>
    <div class="legend-item"><span class="legend-dot" style="background:#EC4899"></span>신규 이용 유저</div>
    <div class="legend-item"><span class="legend-dot" style="background:#6366F1"></span>앱 설치수</div>
  </div>
  <div class="join-label">▏ 입사 시점 (2025-01) · 점선 좌측은 입사 전 기준선</div>
  <div class="confidential-note">
    <b>비공개 처리:</b> 매출·CAC·공헌이익율 등 재무 지표는 대외비로 절대 수치를 노출하지 않으며, 모든 지표는 입사 시점(=0%) 대비 <b>성장율(%)</b>로만 표시합니다.
  </div>
</div>

<script>
const labels = ["2024-01","2024-02","2024-03","2024-04","2024-05","2024-06","2024-07","2024-08","2024-09","2024-10","2024-11","2024-12","2025-01","2025-02","2025-03","2025-04","2025-05","2025-06","2025-07","2025-08","2025-09","2025-10","2025-11","2025-12","2026-01","2026-02","2026-03","2026-04","2026-05"];
const JOIN = 12; // 입사 시점 인덱스 (2025-01)

// 모든 지표를 입사(2025-01) 시점 대비 성장율(%)로만 노출 — 매출/CAC/공헌이익율 등 재무 지표는 비공개
const dau30     = [-88.94,-85.22,-83.43,-80.37,-74.52,-63.7,-51.93,-36.32,-31.53,-23.77,-19.58,-6.66,0,11.5,41.78,75.27,102.54,147.19,204.36,230.39,252.01,294.63,300.01,358.79,394.09,460.34,547.15,397.01,710.38];
const totaluser = [-79.85,-77.67,-75.35,-73.07,-69.15,-62.77,-55.42,-47.06,-40.16,-31.77,-22.4,-9.73,0,7.55,21.72,35.89,51.49,71.61,98.23,125.8,150.09,180.09,200.65,229.23,258.77,294.02,344.82,389.07,434.45];
const orders    = [-86.7,-85.58,-80.28,-72.32,-56.55,-52,-39.15,-26.27,-24.23,-15.58,-16.49,-7.85,0,2.99,34.03,59.8,91.19,167.92,236.23,264.27,258.46,306.94,294.39,364.97,394.23,445.42,603.63,643.88,758.94];
const signup    = [-82.13,-78.07,-76.66,-76.23,-59.86,-34.66,-23.02,-17.44,-28.61,-15.51,-5.64,27.59,0,-20.09,44.55,39.94,57.11,102.71,172.37,177.66,144.69,202.11,123.83,187.83,197.45,255.09,411.56,345.74,357];
const newuser   = [-86.66,-77.99,-78.51,-77.96,-68.26,-49.56,-32.29,-12.89,-31.93,-28.03,-31.08,-6.5,0,-0.81,80.79,113.08,131.19,178.73,278.4,250.81,218.15,275.46,227.41,365.21,347.54,381.96,595,646.8,696.47];
const install   = [-80.76,-77.48,-76.52,-75.59,-56.22,-24.8,-16.05,-12.33,-24.48,1.12,19.86,54.75,0,-20.12,47.96,22.07,34.03,76.38,140.19,183.82,149.17,196.86,100.53,162.27,227.01,265.64,388.67,337.86,357.42];

const joinLine = {
  type:'line', xMin:JOIN, xMax:JOIN,
  borderColor:'rgba(96,165,250,0.7)', borderWidth:2, borderDash:[5,4],
  label:{ display:true, content:'입사', position:'start', color:'#60A5FA', font:{size:10,weight:'bold'}, backgroundColor:'rgba(17,24,39,0.85)', padding:{x:6,y:3}, yAdjust:-8 }
};

new Chart(document.getElementById('chartAll').getContext('2d'), {
  type: 'line',
  data: {
    labels,
    datasets: [
      { label:'누적 총 유저', data:totaluser, borderColor:'#DC2626', backgroundColor:'transparent', borderWidth:3,   pointRadius:2.5, tension:0.35, yAxisID:'y' },
      { label:'30DAU',       data:dau30,     borderColor:'#1A56DB', backgroundColor:'transparent', borderWidth:2.5, pointRadius:2, tension:0.35, yAxisID:'y' },
      { label:'주문 수',      data:orders,    borderColor:'#10B981', backgroundColor:'transparent', borderWidth:2.5, pointRadius:2, tension:0.35, yAxisID:'y' },
      { label:'신규 가입자',   data:signup,    borderColor:'#8B5CF6', backgroundColor:'transparent', borderWidth:2,   pointRadius:2, tension:0.35, borderDash:[4,3], yAxisID:'y' },
      { label:'신규 이용 유저', data:newuser,  borderColor:'#EC4899', backgroundColor:'transparent', borderWidth:2,   pointRadius:2, tension:0.35, borderDash:[4,3], yAxisID:'y' },
      { label:'앱 설치수',     data:install,   borderColor:'#6366F1', backgroundColor:'transparent', borderWidth:2,   pointRadius:2, tension:0.35, yAxisID:'y' }
    ]
  },
  options: {
    responsive:true, maintainAspectRatio:false,
    interaction:{ mode:'index', intersect:false },
    plugins: {
      legend:{ display:false },
      tooltip:{ callbacks:{ label: ctx => {
        const v = ctx.raw; const s = v >= 0 ? '+' : '';
        return `${ctx.dataset.label}: ${s}${v.toFixed(0)}% (입사 대비)`;
      }}},
      annotation:{ annotations:{ joinLine,
        zero:{ type:'line', yMin:0, yMax:0, yScaleID:'y', borderColor:'rgba(156,163,175,0.4)', borderWidth:1, borderDash:[3,3] }
      }}
    },
    scales: {
      x:  { ticks:{ font:{size:9}, maxRotation:45, color:'#9CA3AF' }, grid:{ display:false } },
      y:  { position:'left',  title:{ display:true, text:'입사 대비 성장율 (%)', font:{size:10}, color:'#9CA3AF' }, ticks:{ font:{size:9}, color:'#9CA3AF', callback: v=>v+'%' }, grid:{ color:'#F3F4F6' } }
    }
  }
});
</script>
</body>
</html>
